kind = "web"
previewPath = "/"
title = "Pocket AI Signals Pro"
version = "1.0.0"
id = "artifacts/pocket-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19177

[services.development]
run = "pnpm --filter @workspace/pocket-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pocket-ai", "run", "build" ]
publicDir = "artifacts/pocket-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19177"
BASE_PATH = "/"
